<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Racing Maniac</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1208;
        font-family: system-ui, sans-serif;
      }

      #renderCanvas {
        width: 100%;
        height: 100%;
        touch-action: none;
        display: block;
      }

      #error {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        padding: 12px 16px;
        background: #8b1a1a;
        color: #fff;
        font-size: 14px;
      }

      #hud {
        position: fixed;
        left: 16px;
        bottom: 16px;
        padding: 12px 14px;
        border-radius: 8px;
        background: rgba(20, 14, 8, 0.78);
        color: #f4e6c8;
        font-size: 14px;
        line-height: 1.45;
        pointer-events: none;
        user-select: none;
        min-width: 180px;
      }

      #hud-title {
        font-weight: 700;
        margin-bottom: 6px;
      }

      #hud-stats {
        display: flex;
        align-items: baseline;
        gap: 10px;
        margin-bottom: 6px;
      }

      #hud-speed {
        font-size: 28px;
        font-weight: 700;
        line-height: 1;
      }

      #hud-speed-label {
        font-size: 12px;
        opacity: 0.8;
      }

      #hud-status {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
      }

      #hud-status.is-air {
        background: rgba(255, 196, 64, 0.35);
        color: #ffe7a8;
      }

      #hud-help {
        font-size: 12px;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="error"></div>
    <div id="hud">
      <div id="hud-title">Racing Maniac</div>
      <div id="hud-stats">
        <span id="hud-speed">0</span>
        <span id="hud-speed-label">speed</span>
        <span id="hud-status">GND</span>
      </div>
      <div id="hud-help">WASD / arrows — yellow hood is the front</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
