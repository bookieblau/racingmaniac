<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Racing Maniac</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1208;
        font-family: system-ui, sans-serif;
      }

      #renderCanvas {
        width: 100%;
        height: 100%;
        touch-action: none;
        display: block;
      }

      #error {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        padding: 12px 16px;
        background: #8b1a1a;
        color: #fff;
        font-size: 14px;
      }

      #hud {
        position: fixed;
        left: 16px;
        bottom: 16px;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(20, 14, 8, 0.72);
        color: #f4e6c8;
        font-size: 14px;
        line-height: 1.5;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="error"></div>
    <div id="hud">
      <strong>Racing Maniac</strong><br />
      Drive: WASD or arrow keys
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
