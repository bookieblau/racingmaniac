<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#c87d3a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <title>Racing Maniac</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1208;
        font-family: system-ui, sans-serif;
      }

      #renderCanvas {
        width: 100%;
        height: 100%;
        touch-action: none;
        display: block;
      }

      #error {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        padding: 12px 16px;
        background: #8b1a1a;
        color: #fff;
        font-size: 14px;
      }

      #hud {
        position: fixed;
        left: 16px;
        bottom: 16px;
        padding: 12px 14px;
        border-radius: 8px;
        background: rgba(20, 14, 8, 0.78);
        color: #f4e6c8;
        font-size: 14px;
        line-height: 1.45;
        pointer-events: none;
        user-select: none;
        min-width: 180px;
      }

      #hud-title {
        font-weight: 700;
        margin-bottom: 6px;
      }

      #hud-stats {
        display: flex;
        align-items: baseline;
        gap: 10px;
        margin-bottom: 6px;
      }

      #hud-speed {
        font-size: 28px;
        font-weight: 700;
        line-height: 1;
      }

      #hud-speed-label {
        font-size: 12px;
        opacity: 0.8;
      }

      #hud-status {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
      }

      #hud-status.is-air {
        background: rgba(255, 196, 64, 0.35);
        color: #ffe7a8;
      }

      #hud-help {
        font-size: 12px;
        opacity: 0.85;
      }

      /* ── Fullscreen button ──────────────────────────────────────────────── */

      #fullscreen-btn {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 20;
        width: 44px;
        height: 44px;
        border-radius: 8px;
        border: 1.5px solid rgba(255, 255, 255, 0.30);
        background: rgba(0, 0, 0, 0.40);
        color: rgba(255, 255, 255, 0.80);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        transition: background 0.1s;
      }

      #fullscreen-btn:active {
        background: rgba(255, 255, 255, 0.18);
      }

      /* ── Touch controls ─────────────────────────────────────────────────── */

      #touch-controls {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 160px;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding: 0 20px 20px;
        pointer-events: none;     /* container transparent; buttons capture */
        user-select: none;
        z-index: 10;
      }

      /* Hide on devices that have a fine pointer (mouse) */
      @media (hover: hover) and (pointer: fine) {
        #touch-controls { display: none; }
      }

      /* On touch devices move the HUD to the top so controls own the bottom */
      @media (hover: none) and (pointer: coarse) {
        #hud {
          bottom: auto;
          top: 16px;
        }
        #hud-help { display: none; }  /* keyboard hint not relevant on touch */
      }

      .touch-zone {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        pointer-events: none;
      }

      .touch-btn {
        pointer-events: all;
        touch-action: none;
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.35);
        background: rgba(0, 0, 0, 0.42);
        color: rgba(255, 255, 255, 0.85);
        font-size: 26px;
        line-height: 1;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-tap-highlight-color: transparent;
        transition: background 0.08s, transform 0.08s;
      }

      .touch-btn:active,
      .touch-btn.pressed {
        background: rgba(255, 255, 255, 0.22);
        transform: scale(0.93);
      }

      .gas-btn {
        width: 86px;
        height: 86px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.05em;
        border-color: rgba(80, 255, 100, 0.55);
        color: rgba(160, 255, 170, 0.90);
      }

      .brake-btn {
        width: 62px;
        height: 62px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.05em;
        border-color: rgba(255, 100, 80, 0.50);
        color: rgba(255, 160, 150, 0.90);
        align-self: flex-end;
        margin-bottom: 6px;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="error"></div>

    <!-- Fullscreen toggle button -->
    <button id="fullscreen-btn" title="Fullscreen" aria-label="Toggle fullscreen">
      <!-- Four-corner expand icon (SVG, no font dependency) -->
      <svg id="fs-icon" viewBox="0 0 24 24" width="20" height="20"
           fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 8L3 3L8 3M16 3L21 3L21 8M3 16L3 21L8 21M16 21L21 21L21 16"/>
      </svg>
    </button>
    <div id="hud">
      <div id="hud-title">Racing Maniac</div>
      <div id="hud-stats">
        <span id="hud-speed">0</span>
        <span id="hud-speed-label">speed</span>
        <span id="hud-status">GND</span>
      </div>
      <div id="hud-help">WASD / arrows — yellow hood is the front</div>
    </div>
    <!-- Touch controls – hidden automatically on mouse devices via CSS -->
    <div id="touch-controls">
      <!-- Left zone: steering -->
      <div class="touch-zone">
        <button class="touch-btn" type="button" data-action="left">&#9664;</button>
        <button class="touch-btn" type="button" data-action="right">&#9654;</button>
      </div>
      <!-- Right zone: gas (large) + brake (smaller, above) -->
      <div class="touch-zone" style="flex-direction:column-reverse; gap:10px;">
        <button class="touch-btn gas-btn"   type="button" data-action="forward">GAS</button>
        <button class="touch-btn brake-btn" type="button" data-action="backward">BRAKE</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>

    <!-- Fullscreen controller (plain script, no module needed) -->
    <script>
      (function () {
        var btn  = document.getElementById('fullscreen-btn');
        var icon = document.getElementById('fs-icon').querySelector('path');
        var EXPAND   = 'M3 8L3 3L8 3M16 3L21 3L21 8M3 16L3 21L8 21M16 21L21 21L21 16';
        var COMPRESS = 'M8 3L8 8L3 8M21 8L16 8L16 3M3 16L8 16L8 21M21 16L16 16L16 21';

        function update() {
          var inFS = !!document.fullscreenElement;
          icon.setAttribute('d', inFS ? COMPRESS : EXPAND);
          btn.title = inFS ? 'Exit fullscreen' : 'Fullscreen';
        }

        btn.addEventListener('click', function () {
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen({ navigationUI: 'hide' })
              .catch(function (err) { console.warn('Fullscreen failed:', err.message); });
          } else {
            document.exitFullscreen();
          }
        });

        document.addEventListener('fullscreenchange', update);
        update();
      })();
    </script>
  </body>
</html>
